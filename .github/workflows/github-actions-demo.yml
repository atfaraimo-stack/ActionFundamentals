name: GitHub Actions Demo

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '15 6 * * 0'
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Output event name
        run: echo "Event: ${{ github.event_name }}"
      - name: Output branch name
        run: echo "Branch: ${{ github.ref }}"
      - name: List all files
        run: ls -R
